    total:c.total
  }));

  const gastosGerencia=GASTOS_GERENCIA.map(g=>({

    tipo:g.tipo,docNum:'',category:'Operacional'

    id:uid(),date:g.date,desc:g.desc,amount:g.amount,
    invoiceNum:g.invoiceNum,category:g.category
  }));

  const ventas=INGRESOS.map(v=>({
    id:uid(),name:v.name,phone:'',date:v.date,notes:'Registrado desde cartola bancaria mayo 2026',
    estado:'completada',invoiceType:'sin_documento',invoiceNum:'',
    parts:[{id:uid(),cat:'PC base',type:'PC Armado',name:v.name,ph:'',
            cost:Math.round(v.amount/1.2),margin:20,qty:1,store:''}]

  const state={

    capital:60000000,
    mktBudgets:{'2026-05':200000},

function row(date,desc,amt,tipo){
  const cl=tipo==='cargo'?'cargo':'abono';
  const prefix=tipo==='cargo'?'−':'+';
  return`<div class="row"><div class="row-date">${date.slice(5).replace('-','/')}</div><div><div class="row-desc">${desc}</div></div><div class="row-amt ${cl}">${prefix} ${fmt(amt)}</div></div>`;
}

`;

function showStatus(msg,type){
  const el=document.getElementById('status');
  el.textContent=msg;el.className='status '+type;el.style.display='block';
}

function cargarFirebase(){
  const btn=document.getElementById('btn-ok');
  btn.disabled=true;btn.textContent='Conectando...';
  showStatus('Conectando a Firebase...','warn');
  try{
    firebase.initializeApp(FB_CFG);
    const ref=firebase.database().ref('desit_spa_data');
    btn.textContent='Cargando datos...';
    const state=buildState();
    ref.set(state).then(()=>{
      showStatus(`✅ ¡Listo! ${COMPRAS_RAW.length} compras, ${GASTOS_GERENCIA.length+GASTOS_CF.length+GASTOS_MKT.length} gastos y ${INGRESOS.length} ingresos cargados. Abre index.html para ver el dashboard.`,'ok');
      btn.textContent='✓ Cargado';
    }).catch(err=>{
      showStatus('Error Firebase: '+err.message,'err');
      btn.disabled=false;btn.textContent='⬆ Reintentar';
    });
  }catch(e){
    showStatus('Error: '+e.message,'err');
    btn.disabled=false;btn.textContent='⬆ Reintentar';
  }
}
